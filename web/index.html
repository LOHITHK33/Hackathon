<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Nexus — agent swarm console</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <style>
      :root {
        --bg: #0a0c12;
        --panel: #11141c;
        --panel-2: #161a24;
        --line: rgba(255, 255, 255, 0.08);
        --line-strong: rgba(255, 255, 255, 0.16);
        --text: #e6e8ee;
        --muted: #8b92a5;
        --teal: #2dd4bf;
        --amber: #f5b544;
        --violet: #a78bfa;
        --red: #f87171;
        --mono: "IBM Plex Mono", ui-monospace, monospace;
        --display: "Space Grotesk", system-ui, sans-serif;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        height: 100%;
      }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: var(--display);
        display: flex;
        flex-direction: column;
        min-height: 100vh;
      }
      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 16px 24px;
        border-bottom: 1px solid var(--line);
      }
      .brand {
        display: flex;
        align-items: baseline;
        gap: 12px;
      }
      .brand h1 {
        font-size: 20px;
        font-weight: 600;
        margin: 0;
        letter-spacing: 0.12em;
      }
      .brand .dot {
        color: var(--teal);
      }
      .brand span.sub {
        font-family: var(--mono);
        font-size: 12px;
        color: var(--muted);
      }
      .status-pill {
        display: flex;
        align-items: center;
        gap: 8px;
        font-family: var(--mono);
        font-size: 12px;
        color: var(--muted);
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 6px 12px;
      }
      .status-pill .led {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--muted);
      }
      .status-pill.online .led {
        background: var(--teal);
        box-shadow: 0 0 8px var(--teal);
      }
      .status-pill.offline .led {
        background: var(--red);
      }

      .query-bar {
        display: flex;
        gap: 10px;
        padding: 18px 24px;
        border-bottom: 1px solid var(--line);
      }
      .query-bar input {
        flex: 1;
        background: var(--panel);
        border: 1px solid var(--line-strong);
        border-radius: 10px;
        padding: 14px 16px;
        color: var(--text);
        font-family: var(--display);
        font-size: 15px;
        outline: none;
      }
      .query-bar input:focus {
        border-color: var(--teal);
      }
      .query-bar button {
        background: var(--teal);
        color: #04201c;
        border: none;
        border-radius: 10px;
        padding: 0 22px;
        font-family: var(--display);
        font-weight: 600;
        font-size: 14px;
        cursor: pointer;
        letter-spacing: 0.02em;
      }
      .query-bar button:disabled {
        opacity: 0.5;
        cursor: default;
      }

      main {
        display: grid;
        grid-template-columns: 1.4fr 1fr;
        gap: 0;
        flex: 1;
        min-height: 0;
      }
      .graph-pane {
        position: relative;
        border-right: 1px solid var(--line);
        min-height: 420px;
      }
      #graph {
        position: absolute;
        inset: 0;
      }
      .pane-label {
        position: absolute;
        top: 14px;
        left: 16px;
        z-index: 2;
        font-family: var(--mono);
        font-size: 11px;
        letter-spacing: 0.14em;
        color: var(--muted);
        text-transform: uppercase;
      }

      .feed-pane {
        display: flex;
        flex-direction: column;
        min-height: 0;
      }
      .feed-head {
        font-family: var(--mono);
        font-size: 11px;
        letter-spacing: 0.14em;
        color: var(--muted);
        text-transform: uppercase;
        padding: 16px 20px 10px;
        border-bottom: 1px solid var(--line);
      }
      .feed {
        flex: 1;
        overflow-y: auto;
        padding: 16px 20px;
      }
      .event {
        display: flex;
        gap: 10px;
        margin-bottom: 12px;
        align-items: baseline;
      }
      .event .tag {
        font-family: var(--mono);
        font-size: 10px;
        padding: 2px 7px;
        border-radius: 5px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        flex-shrink: 0;
      }
      .tag.status {
        background: rgba(45, 212, 191, 0.14);
        color: var(--teal);
      }
      .tag.token {
        background: rgba(167, 139, 250, 0.14);
        color: var(--violet);
      }
      .tag.error {
        background: rgba(248, 113, 113, 0.16);
        color: var(--red);
      }
      .event .msg {
        font-size: 13px;
        color: var(--muted);
        line-height: 1.5;
        font-family: var(--mono);
      }

      .answer {
        border-top: 1px solid var(--line);
        padding: 16px 20px;
        max-height: 38%;
        overflow-y: auto;
        font-size: 15px;
        line-height: 1.6;
        white-space: pre-wrap;
      }
      .answer:empty {
        display: none;
      }
      .answer .caret {
        color: var(--teal);
        animation: blink 1s steps(1) infinite;
      }
      @keyframes blink {
        50% {
          opacity: 0;
        }
      }
      @media (prefers-reduced-motion: reduce) {
        .answer .caret {
          animation: none;
        }
      }

      @media (max-width: 820px) {
        main {
          grid-template-columns: 1fr;
        }
        .graph-pane {
          border-right: none;
          border-bottom: 1px solid var(--line);
          height: 320px;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="brand">
        <h1>NE<span class="dot">X</span>US</h1>
        <span class="sub">decision intelligence swarm</span>
      </div>
      <div class="status-pill" id="statusPill">
        <span class="led"></span><span id="statusText">connecting…</span>
      </div>
    </header>

    <div class="query-bar">
      <input
        id="query"
        placeholder="Ask a complex decision question…"
        autocomplete="off"
      />
      <button id="run">Run swarm</button>
    </div>

    <main>
      <section class="graph-pane">
        <div class="pane-label">swarm</div>
        <div id="graph"></div>
      </section>
      <section class="feed-pane">
        <div class="feed-head">live feed</div>
        <div class="feed" id="feed"></div>
        <div class="answer" id="answer"></div>
      </section>
    </main>

    <script>
      const feed = document.getElementById("feed");
      const answerEl = document.getElementById("answer");
      const runBtn = document.getElementById("run");
      const queryEl = document.getElementById("query");

      function logEvent(kind, msg) {
        const row = document.createElement("div");
        row.className = "event";
        row.innerHTML = `<span class="tag ${kind}">${kind}</span><span class="msg"></span>`;
        row.querySelector(".msg").textContent = msg;
        feed.appendChild(row);
        feed.scrollTop = feed.scrollHeight;
      }

      async function checkHealth() {
        const pill = document.getElementById("statusPill");
        const txt = document.getElementById("statusText");
        try {
          const r = await fetch("/health");
          const d = await r.json();
          pill.classList.add("online");
          pill.classList.remove("offline");
          txt.textContent = d.model + " · local";
        } catch {
          pill.classList.add("offline");
          pill.classList.remove("online");
          txt.textContent = "model offline";
        }
      }

      let network, nodes, edges;
      function initGraph() {
        nodes = new vis.DataSet([
          {
            id: "core",
            label: "Nexus core",
            color: nodeColor("#2DD4BF"),
            font: nodeFont(),
          },
        ]);
        edges = new vis.DataSet([]);
        network = new vis.Network(
          document.getElementById("graph"),
          { nodes, edges },
          {
            nodes: { shape: "dot", size: 18, borderWidth: 2 },
            edges: {
              color: { color: "rgba(255,255,255,0.18)" },
              width: 1.2,
              smooth: true,
            },
            physics: { stabilization: false, barnesHut: { springLength: 120 } },
            interaction: { dragNodes: true, zoomView: true },
          },
        );
      }
      function nodeColor(c) {
        return {
          background: c,
          border: c,
          highlight: { background: c, border: "#fff" },
        };
      }
      function nodeFont() {
        return { color: "#E6E8EE", face: "IBM Plex Mono", size: 13 };
      }

      function spawnModelNode(model) {
        if (nodes.get("model")) return;
        nodes.add({
          id: "model",
          label: model,
          color: nodeColor("#A78BFA"),
          font: nodeFont(),
        });
        edges.add({ id: "core-model", from: "core", to: "model" });
      }
      function setModelState(color) {
        if (nodes.get("model"))
          nodes.update({ id: "model", color: nodeColor(color) });
      }

      function run() {
        const q = queryEl.value.trim();
        if (!q) {
          queryEl.focus();
          return;
        }
        feed.innerHTML = "";
        answerEl.innerHTML = "";
        runBtn.disabled = true;
        let answer = "";

        const es = new EventSource("/api/stream?q=" + encodeURIComponent(q));

        es.addEventListener("status", (e) => {
          const d = JSON.parse(e.data);
          if (d.stage === "starting") {
            logEvent("status", "spawning model node · " + d.model);
            spawnModelNode(d.model);
          }
          if (d.stage === "thinking") {
            logEvent("status", "model is reasoning…");
            setModelState("#F5B544");
          }
        });
        es.addEventListener("token", (e) => {
          const d = JSON.parse(e.data);
          answer += d.text;
          answerEl.innerHTML = "";
          answerEl.append(document.createTextNode(answer));
          const caret = document.createElement("span");
          caret.className = "caret";
          caret.textContent = "▍";
          answerEl.append(caret);
          answerEl.scrollTop = answerEl.scrollHeight;
        });
        es.addEventListener("done", () => {
          logEvent("status", "complete");
          setModelState("#2DD4BF");
          answerEl.innerHTML = "";
          answerEl.append(document.createTextNode(answer));
          runBtn.disabled = false;
          es.close();
        });
        es.addEventListener("error", (e) => {
          let msg = "stream error";
          try {
            msg = JSON.parse(e.data).message;
          } catch {}
          logEvent("error", msg);
          setModelState("#F87171");
          runBtn.disabled = false;
          es.close();
        });
      }

      runBtn.addEventListener("click", run);
      queryEl.addEventListener("keydown", (e) => {
        if (e.key === "Enter") run();
      });

      initGraph();
      checkHealth();
      setInterval(checkHealth, 8000);
    </script>
  </body>
</html>
